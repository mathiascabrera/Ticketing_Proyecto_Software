<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Client</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/login-register-styles.css">
</head>

<body class="bodyindex">

    <head class="headindex">
        <nav class="navindex">
            <div class="nav-container">
                <a class="arrow-a" href="./index.html"><i class="fa-solid fa-circle-arrow-left arrow-icon"></i></i></a>
            </div>
        </nav>
    </head>
    <main class="mainindex">
        <section class="form-section">
            <form>
                <div class="mb-3">
                    <label for="InputEmail" class="form-label text-form">Email address</label>
                    <input type="email" class="form-control" id="InputEmailLoginClient" aria-describedby="emailHelp">
                    <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
                </div>
                <div class="mb-3">
                    <label for="InputPassword" class="form-label text-form">Password</label>
                    <input type="password" class="form-control" id="InputPasswordLoginClient">
                </div>
                <button type="submit" class="btn btn-primary btn-register">Login</button>
                <a href="./index.html" class="btn btn-danger btn-cancel">Cancel</a>
            </form>
        </section>
    </main>
    <footer class="footerindex">
        <p class="text-footer">All rights reserved.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/js/views/loginClient.js"></script>
</body>

</html>
