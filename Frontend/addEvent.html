<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Add Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/add-event.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">


</head>

<body>
    <nav class="nav-add-event navindexevent">
        <div class="nav-container nav-two-elements">
            <a class="arrow-a" href="./homeAdmin.html"><i class="fa-solid fa-circle-arrow-left arrow-icon"></i></a>
            <a class="btn-log-out" href="./index.html">Log out <i class="fa-solid fa-arrow-right-from-bracket"></i></a>
        </div>
    </nav>
    <div class="container">
        <div class="sidebar">
            <h2 class="title-event-panel">🎟 Event</h2>
            <div class="field">
                <label class="label-txt">Name</label>
                <input id="eventName" required>
            </div>
            <div class="field">
                <label class="label-txt">Date</label>
                <input type="text" id="eventDate" required>
                <!-- <input type="datetime-local" id="eventDate" required> -->
            </div>
            <div class="field">
                <label class="label-txt">Place</label>
                <input id="eventPlace" required>
            </div>
            <div class="field">
                <label class="label-txt">Description</label>
                <input id="eventDescription">
            </div>
            <div class="field">
                <label class="label-txt">Status</label>
                <select id="eventState">
                    <option value="activo">Active</option>
                    <option value="inactivo">Inactive</option>
                </select>
            </div>
            <div class="field">
                <label class="label-txt">URL 1</label>
                <input id="url1">
            </div>
            <div class="field">
                <label class="label-txt">URL 2</label>
                <input id="url2">
            </div>
            <hr>
            <h2 class="sector-title">Sector</h2>
            <div class="field">
                <label class="label-txt">Name</label>
                <input id="sectorName">
            </div>
            <div class="field">
                <label class="label-txt" id="rowtext"></label>
                <input type="number" id="rows" value="5">
            </div>
            <div class="field">
                <label class="label-txt" id="columntext"></label>
                <input type="number" id="cols" value="10">
            </div>
            <div class="field">
                <label class="label-txt">Price</label>
                <input type="number" id="price">
            </div>
            <button class="btn btn-primary" onclick="addSector()">Add Sector</button>
            <button class="btn btn-success" onclick="save()">Save Event</button>
        </div>
        <div class="preview">
            <h1 class="stage">SCENERY</h1>
            <div class="grid-container" id="grid">
                <div class="toastdiv" id="toast"></div>
            </div>
        </div>
    </div>
    <footer class="footerevent">
        <p class="text-footer">All rights reserved.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="./js/views/addEvent.js"></script>
</body>

</html>
