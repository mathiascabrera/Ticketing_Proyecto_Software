<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Add Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/add-event.css">
</head>

<body>
    <nav class="nav-add-event">
        <div class="nav-container nav-two-elements">
            <a class="arrow-a" href="./homeAdmin.html"><i class="fa-solid fa-circle-arrow-left arrow-icon"></i></a>
            <a class="btn-log-out" href="./index.html">Log out <i class="fa-solid fa-arrow-right-from-bracket"></i></a>
        </div>
    </nav>
    <div class="container">
        <div class="sidebar">
            <h2>🎟 Evento</h2>
            <div class="field">
                <label>Nombre</label>
                <input id="eventName" required>
            </div>
            <div class="field">
                <label>Fecha</label>
                <input type="datetime-local" id="eventDate" required>
            </div>
            <div class="field">
                <label>Lugar</label>
                <input id="eventPlace" required>
            </div>
            <div class="field">
                <label>Descripción</label>
                <input id="eventDescription">
            </div>
            <div class="field">
                <label>Estado</label>
                <select id="eventState">
                    <option value="activo">Activo</option>
                    <option value="inactivo">Inactivo</option>
                </select>
            </div>
            <div class="field">
                <label>URL 1</label>
                <input id="url1">
            </div>
            <div class="field">
                <label>URL 2</label>
                <input id="url2">
            </div>
            <hr>
            <h2>Sector</h2>
            <div class="field">
                <label>Nombre</label>
                <input id="sectorName">
            </div>
            <div class="field">
                <label>Filas (max 60)</label>
                <input type="number" id="rows" value="5">
            </div>
            <div class="field">
                <label>Columnas (max 60)</label>
                <input type="number" id="cols" value="10">
            </div>
            <div class="field">
                <label>Precio</label>
                <input type="number" id="price">
            </div>
            <button class="btn btn-primary" onclick="addSector()">Agregar Sector</button>
            <button class="btn btn-success" onclick="save()">Guardar Evento</button>
            <pre class="json" id="json"></pre>
        </div>
        <div class="preview">
            <div class="stage">ESCENARIO</div>
            <div class="grid-container" id="grid">
                <div class="toast" id="toast"></div>
            </div>
        </div>
    </div>
    <footer class="footer-add-event">
        <p class="text-footer">All rights reserved.</p>
    </footer>
    <script src="./js/views/addEvent.js"></script>
</body>

</html>
